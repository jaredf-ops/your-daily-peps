<svg width="210" height="44" viewBox="0 0 210 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Molecule mark centered at (20, 22), fits in ~38x36px -->
  <!-- Center ring -->
  <circle cx="20" cy="22" r="5" stroke="#0f2744" stroke-width="2" fill="none"/>
  <!-- Top arm + blue node -->
  <line x1="20" y1="17" x2="20" y2="10" stroke="#0f2744" stroke-width="1.8"/>
  <circle cx="20" cy="8" r="2.8" fill="#1d6fb8"/>
  <!-- Lower-left arm + navy node -->
  <line x1="15.5" y1="25.5" x2="9" y2="31" stroke="#0f2744" stroke-width="1.8"/>
  <circle cx="7" cy="33" r="2.8" fill="#0f2744"/>
  <!-- Lower-right arm + navy node -->
  <line x1="24.5" y1="25.5" x2="31" y2="31" stroke="#0f2744" stroke-width="1.8"/>
  <circle cx="33" cy="33" r="2.8" fill="#0f2744"/>
  <!-- Upper-right arm + blue node -->
  <line x1="24.5" y1="18.5" x2="31" y2="12" stroke="#0f2744" stroke-width="1.8"/>
  <circle cx="33" cy="10" r="2.8" fill="#1d6fb8"/>
  <!-- DailyPep wordmark -->
  <text x="46" y="31" font-family="Arial" font-weight="800" font-size="27">
    <tspan fill="#0f2744">Daily</tspan><tspan fill="#1d6fb8">Pep</tspan>
  </text>
</svg>
