<svg width="280" height="112" viewBox="0 0 280 112" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Molecule mark centered at (140, 24) -->
  <circle cx="140" cy="24" r="7" stroke="#0f2744" stroke-width="2.5" fill="none"/>
  <!-- Top arm + node (blue accent) -->
  <line x1="140" y1="17" x2="140" y2="5" stroke="#0f2744" stroke-width="2"/>
  <circle cx="140" cy="3" r="3.5" fill="#1d6fb8"/>
  <!-- Lower-left arm + node -->
  <line x1="134" y1="28.5" x2="124" y2="39" stroke="#0f2744" stroke-width="2"/>
  <circle cx="122" cy="41" r="3.5" fill="#0f2744"/>
  <!-- Lower-right arm + node -->
  <line x1="146" y1="28.5" x2="156" y2="39" stroke="#0f2744" stroke-width="2"/>
  <circle cx="158" cy="41" r="3.5" fill="#0f2744"/>
  <!-- Upper-right arm + node (blue accent) -->
  <line x1="146" y1="19" x2="156" y2="9" stroke="#0f2744" stroke-width="2"/>
  <circle cx="158" cy="7" r="3.5" fill="#1d6fb8"/>
  <!-- DailyPep as one word, centered, two-color -->
  <text x="140" y="94" text-anchor="middle" font-family="Arial" font-weight="800" font-size="46">
    <tspan fill="#0f2744">Daily</tspan><tspan fill="#1d6fb8">Pep</tspan>
